<text x="-10" y="9.1" font-size="0.85" font-family="sans-serif" fill="#44403c">1. Vehicular approach assumed from the</text>
<text x="-10" y="10.25" font-size="0.85" font-family="sans-serif" fill="#44403c">high-station end (derived from side-of-street +</text>
