<text x="-10" y="12.55" font-size="0.85" font-family="sans-serif" fill="#44403c">traffic direction in the adjacent lane; one-way</text>
<text x="-10" y="13.700000000000001" font-size="0.85" font-family="sans-serif" fill="#44403c">streets can flip this.</text>
<text x="-10" y="15.100000000000001" font-size="0.85" font-family="sans-serif" fill="#44403c">2. Fire Department Connection locations are</text>
<text x="-10" y="16.25" font-size="0.85" font-family="sans-serif" fill="#44403c">building-mounted and not in any DC dataset —</text>
<text x="-10" y="17.4" font-size="0.85" font-family="sans-serif" fill="#44403c">SITE-WALK: confirm FDC position; enclosure needs a</text>
