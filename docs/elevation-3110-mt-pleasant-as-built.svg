<text x="-8" y="9.1" font-size="0.85" font-family="sans-serif" fill="#44403c">1. Vehicular approach assumed from the high-station end (derived from side-of-street + route direction). SITE-WALK CONFIRM: verify</text>
<text x="-8" y="10.25" font-size="0.85" font-family="sans-serif" fill="#44403c">traffic direction in the adjacent lane; one-way streets can flip this.</text>
<text x="-8" y="11.65" font-size="0.85" font-family="sans-serif" fill="#44403c">2. Frontage window OVERRIDDEN to 50 ft — extends past the business&apos;s own storefront. §4.1 requires letters of consent from the</text>
<text x="-8" y="12.8" font-size="0.85" font-family="sans-serif" fill="#44403c">adjacent property owner(s) AND ground-floor tenant(s).</text>
<text x="-8" y="14.200000000000001" font-size="0.85" font-family="sans-serif" fill="#44403c">3. Fire Department Connection locations are building-mounted and not in any DC dataset — SITE-WALK: confirm FDC position; enclosure</text>
<text x="-8" y="15.350000000000001" font-size="0.85" font-family="sans-serif" fill="#44403c">needs a 3 ft gap at it.</text>
